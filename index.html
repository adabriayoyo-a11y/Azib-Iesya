<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jemputan Walimatulurus</title>
<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #0d0d0d;
    color: #f5e6c8;
    overflow-x: hidden;
}
/* OPENING */
#opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}
#opening h1 { font-size: 36px; margin-bottom: 20px; }
.open-btn {
    padding: 12px 25px;
    border: none;
    background: gold;
    color: black;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
}
/* MAIN CONTENT */
.content { display: none; text-align: center; }
/* HERO */
.hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; animation: fadeIn 2s ease; }
h1 { font-size: 48px; letter-spacing: 2px; }
.date { opacity: 0.9; margin-top: 10px; font-size: 24px; }
/* SECTIONS */
.section { padding: 60px 20px; animation: fadeUp 1.5s ease; }
.countdown { font-size: 28px; margin-top: 20px; }
/* BUTTONS */
.btn { margin-top: 20px; padding: 12px 25px; background: gold; color: black; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
.btn:hover { box-shadow: 0 0 15px gold; }
/* MUSIC BUTTON */
.music-btn { position: fixed; bottom: 20px; right: 20px; background: gold; border: none; border-radius: 50%; padding: 15px; cursor: pointer; }
/* ANIMATIONS */
@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
@keyframes fadeUp { from {opacity:0; transform:translateY(40px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<!-- OPENING -->
<div id="opening">
    <h1>JEMPUTAN WALIMATULURUS</h1>
    <button class="open-btn" onclick="openInvite()">Buka Jemputan</button>
</div>

<!-- MAIN -->
<div class="content" id="main">
    <div class="hero">
        <h1>Mohd Suhaizan & Habibah</h1>
        <div class="date">25 April 2026</div>
    </div>

    <div class="section">
        <h2>Counting Down</h2>
        <div class="countdown" id="timer"></div>
    </div>

    <div class="section">
        <h2>Wedding Details</h2>
        <p>🕚 11:00 AM - 4:00 PM (Ketibaan jam 12:00 PM)</p>
        <p>📍 Gerbang Glasshouse, Batu 12, Jalan Kapar, 42200 Klang, Selangor</p>
        <a href="https://waze.com/ul/hw281fk6w5" target="_blank"><button class="btn">Waze</button></a>
        <a href="https://maps.app.goo.gl/6TfRDNYfj3ySZyNo6?g_st=aw" target="_blank"><button class="btn">Google Maps</button></a>
    </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
function openInvite() {
    document.getElementById("opening").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
}

// COUNTDOWN TIMER
var countDownDate = new Date("Apr 25, 2026 11:00:00").getTime();
var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;
    var d = Math.floor(distance / (1000*60*60*24));
    var h = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    var m = Math.floor((distance % (1000*60*60)) / (1000*60));
    var s = Math.floor((distance % (1000*60)) / 1000);
    document.getElementById("timer").innerHTML = d+"d "+h+"h "+m+"m "+s+"s";
    if(distance<0){ clearInterval(x); document.getElementById("timer").innerHTML="It's Wedding Time!";}
},1000);

// MUSIC TOGGLE
function toggleMusic() {
    var music = document.getElementById("music");
    if(music.paused){ music.play(); } else { music.pause(); }
}
</script>

</body>
</html>
